<!DOCTYPE html>
<html lang="zh-CN" class="no-js">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rain & Water Effects</title>
  <meta name="description" content="A local recreation of the Codrops WebGL rain effect demo." />
  <link rel="stylesheet" type="text/css" href="css/normalize.css" />
  <link rel="stylesheet" type="text/css" href="css/demo.css" />
  <link rel="stylesheet" type="text/css" href="css/style1.css" />
  <style>
    html,
    body,
    .container,
    .slideshow {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #071423;
    }

    body {
      pointer-events: none;
    }

    .codrops-header,
    .slideshow__nav,
    .slide__element,
    .nosupport {
      display: none !important;
    }
  </style>
</head>
<body class="demo-1">
  <div class="image-preload" aria-hidden="true">
    <img src="img/drop-color.png" alt="" />
    <img src="img/drop-alpha.png" alt="" />
    <img src="img/weather_1/texture-rain-fg.png" alt="" />
    <img src="img/weather_1/texture-rain-bg.png" alt="" />
    <img src="img/weather_1/texture-storm-lightning-fg.png" alt="" />
    <img src="img/weather_1/texture-storm-lightning-bg.png" alt="" />
    <img src="img/weather_1/texture-sun-fg.png" alt="" />
    <img src="img/weather_1/texture-sun-bg.png" alt="" />
    <img src="img/weather_1/texture-fallout-fg.png" alt="" />
    <img src="img/weather_1/texture-fallout-bg.png" alt="" />
    <img src="img/weather_1/texture-drizzle-fg.png" alt="" />
    <img src="img/weather_1/texture-drizzle-bg.png" alt="" />
  </div>

  <div class="container">
    <header class="codrops-header">
      <h1>Rain &amp; Water Effects</h1>
      <nav class="codrops-demos" aria-label="Demo views">
        <a class="current-demo" href="index.html">Weather</a>
      </nav>
    </header>

    <main class="slideshow">
      <canvas width="1" height="1" id="container" style="position:absolute"></canvas>

      <section class="slide" id="slide-1" data-weather="rain" aria-label="Heavy rain">
        <div class="slide__element slide__element--date">Sunday, 24<sup>th</sup> of October 2043</div>
        <div class="slide__element slide__element--temp">12°<small>C</small></div>
      </section>

      <section class="slide" id="slide-2" data-weather="drizzle" aria-label="Drizzle">
        <div class="slide__element slide__element--date">Saturday, 25<sup>th</sup> of October 2043</div>
        <div class="slide__element slide__element--temp">18°<small>C</small></div>
      </section>

      <section class="slide" id="slide-3" data-weather="sunny" aria-label="Sunny">
        <div class="slide__element slide__element--date">Monday, 26<sup>th</sup> of October 2043</div>
        <div class="slide__element slide__element--temp">25°<small>C</small></div>
      </section>

      <section class="slide" id="slide-5" data-weather="storm" aria-label="Storm">
        <div class="slide__element slide__element--date">Wednesday, 28<sup>th</sup> of October 2043</div>
        <div class="slide__element slide__element--temp">20°<small>C</small></div>
      </section>

      <section class="slide" id="slide-4" data-weather="fallout" aria-label="Fallout">
        <div class="slide__element slide__element--date">Tuesday, 27<sup>th</sup> of October 2043</div>
        <div class="slide__element slide__element--temp">34°<small>C</small></div>
      </section>

      <nav class="slideshow__nav" aria-label="Weather states">
        <a class="nav-item" href="#slide-1"><i class="icon icon--rainy"></i><span>10/24</span></a>
        <a class="nav-item" href="#slide-2"><i class="icon icon--drizzle"></i><span>10/25</span></a>
        <a class="nav-item" href="#slide-3"><i class="icon icon--sun"></i><span>10/26</span></a>
        <a class="nav-item" href="#slide-5"><i class="icon icon--storm"></i><span>10/28</span></a>
        <a class="nav-item" href="#slide-4"><i class="icon icon--radioactive"></i><span>10/27</span></a>
      </nav>
    </main>

    <p class="nosupport">Sorry, but your browser does not support WebGL.</p>
  </div>

  <script>
    var textureMatch = (window.location.search + "&" + window.location.hash.replace("#", "")).match(/[?&]textures=([^&]+)/);
    var storedTextureGroup = "";
    try {
      storedTextureGroup = window.parent && window.parent.sessionStorage
        ? window.parent.sessionStorage.getItem("rainTextureGroup") || ""
        : "";
    } catch (error) {}
    var textureGroup = textureMatch ? decodeURIComponent(textureMatch[1]) : storedTextureGroup;
    var allowedTextureGroups = ["weather_1", "weather_2", "weather"];
    window.__rainWeatherTexturePath = "img/" + (allowedTextureGroups.indexOf(textureGroup) >= 0 ? textureGroup : "weather_1") + "/";
  </script>
  <script src="js/index.min.js?v=texture-groups-v3"></script>
</body>
</html>
